# XcodeGen project for the Tessera macOS app.
# Generate the Xcode project with:  cd swift && xcodegen generate
# Then open Tessera.xcodeproj. Requires full Xcode.
name: Tessera
options:
  bundleIdPrefix: com.ibrahemid
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Tessera:
    path: .

targets:
  Tessera:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources/Assets.xcassets
      - path: App/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ibrahemid.tessera
        PRODUCT_NAME: Tessera
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Resources/Tessera.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Set DEVELOPMENT_TEAM to your Apple Developer team ID before archiving.
    dependencies:
      - package: Tessera
        product: TesseraCore
      - package: Tessera
        product: TesseraArgon2
